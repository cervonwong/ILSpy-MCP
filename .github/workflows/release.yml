name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: linux-arm64
            os: ubuntu-latest
            archive: tar.gz
          - rid: osx-x64
            os: macos-latest
            archive: zip
          - rid: osx-arm64
            os: macos-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish ILSpy.Mcp.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd ./publish/${{ matrix.rid }}
          zip -r ../../ilspy-mcp-${{ matrix.rid }}.zip .

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf ilspy-mcp-${{ matrix.rid }}.tar.gz -C ./publish/${{ matrix.rid }} .

      - name: Generate checksum (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            sha256sum ilspy-mcp-${{ matrix.rid }}.zip > ilspy-mcp-${{ matrix.rid }}.sha256
          else
            sha256sum ilspy-mcp-${{ matrix.rid }}.tar.gz > ilspy-mcp-${{ matrix.rid }}.sha256
          fi

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "ilspy-mcp-${{ matrix.rid }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ilspy-mcp-${{ matrix.rid }}.zip" | Out-File -Encoding ascii "ilspy-mcp-${{ matrix.rid }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ilspy-mcp-${{ matrix.rid }}
          path: |
            ilspy-mcp-${{ matrix.rid }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.sha256
